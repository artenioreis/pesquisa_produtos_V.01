<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Busca de Produtos - Varejão Farma</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .search-card { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-primary { background: #003d82; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-card">
        <h3 class="mb-4 text-center">🔍 Pesquisa e Etiquetas Artenio Reis</h3>

        <form action="/pesquisar" method="POST" class="input-group input-group-lg mb-4">
            <input type="text" name="termo" class="form-control" placeholder="Código, Nome ou EAN..." value="{{ termo if termo }}" required autofocus>
            <button type="submit" class="btn btn-primary">Buscar Produto</button>
        </form>

        {% if resultados %}
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Cód.</th>
                        <th>Descrição</th>
                        <th>Preço</th>
                        <th class="text-center">Ação</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in resultados %}
                    <tr>
                        <td>{{ p.Cod_Produt }}</td>
                        <td>{{ p.Des_Produt }}</td>
                        <td class="fw-bold text-success">R$ {{ "%.2f"|format(p.Prc_Venda_V) }}</td>
                        <td class="text-center">
                            <div class="btn-group">
                                <a href="/produto/{{ p.Cod_Produt }}" class="btn btn-outline-info btn-sm">Ver Detalhes</a>
                                <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#modal{{ p.Cod_Produt }}">Imprimir Etiqueta</button>
                            </div>

                            <div class="modal fade" id="modal{{ p.Cod_Produt }}" tabindex="-1">
                                <div class="modal-dialog modal-dialog-centered">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <h5 class="modal-title">Escolha o Modelo</h5>
                                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                        </div>
                                        <div class="modal-body d-grid gap-3 p-4">
                                            <a href="/etiqueta/{{ p.Cod_Produt }}?modelo=gondola" class="btn btn-outline-primary btn-lg">📄 Gôndola Padrão</a>
                                            <a href="/etiqueta/{{ p.Cod_Produt }}?modelo=atacado" class="btn btn-warning btn-lg fw-bold">🏷️ Atacado Amarelo</a>
                                            <a href="/etiqueta_58mm/{{ p.Cod_Produt }}" target="_blank" class="btn btn-dark btn-lg fw-bold">🖨️ Térmica 58mm (PDF)</a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        {% endif %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
